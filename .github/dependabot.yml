version: 2
updates:
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: "ci"
      include: scope

  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "Europe/London"
    open-pull-requests-limit: 5
    labels:
      - dependencies
    commit-message:
      prefix: "chore"
      include: scope
    # Group patch + minor bumps to reduce PR noise. The @openacp/* SDK
    # pins are intentional - bump them via a manual PR so we can review
    # plugin-protocol changes.
    groups:
      patch-and-minor:
        update-types:
          - patch
          - minor
        exclude-patterns:
          - "@openacp/*"
    # Major bumps of the toolchain need a tsconfig / vitest config audit;
    # dependabot can still file them but we'd rather review intentionally.
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
