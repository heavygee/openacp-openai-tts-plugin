name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same PR / branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: TypeScript build
        run: npm run build
      - name: Validate package shape
        run: |
          node -e "const p=require('./package.json'); if(!p.main || !p.types) throw new Error('main/types missing'); console.log('main='+p.main+' types='+p.types)"
      - name: npm pack (dry run)
        run: npm pack --dry-run

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: vitest
        run: npm test

  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: gitleaks (PR diff or full history)
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            LOG_OPTS="--log-opts=${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          else
            LOG_OPTS=""
          fi
          docker run --rm \
            -v "$PWD:/repo" \
            -w /repo \
            zricethezav/gitleaks:v8.30.1 \
            detect \
              --source=/repo \
              --config=/repo/.gitleaks.toml \
              --redact \
              --verbose \
              --no-banner \
              $LOG_OPTS

  owasp-sast:
    name: owasp-sast
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:1.122.0
    steps:
      - uses: actions/checkout@v6
      - name: Semgrep OWASP gate
        run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/typescript \
            --config p/javascript \
            --config p/secrets \
            --config security/semgrep/ \
            --error \
            --metrics off

  ci:
    name: ci
    runs-on: ubuntu-latest
    needs: [build, test, secret-scan, owasp-sast]
    if: always()
    steps:
      - name: Aggregate result
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "::error::One or more required jobs failed."
            exit 1
          fi
          if [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more required jobs were cancelled."
            exit 1
          fi
          echo "All required jobs passed."

  merge-on-green:
    name: merge-on-green
    runs-on: ubuntu-latest
    needs: ci
    if: >
      github.event_name == 'pull_request' &&
      needs.ci.result == 'success' &&
      contains(github.event.pull_request.labels.*.name, 'automerge')
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Squash merge labelled PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ github.event.pull_request.number }}" \
            --squash --delete-branch \
            --repo "${{ github.repository }}"
