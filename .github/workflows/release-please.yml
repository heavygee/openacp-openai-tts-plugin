name: release-please

# Conventional-commits-driven release automation.
#
# Every push to main, release-please:
#   1. Reads the commit log since the last tag
#   2. Computes the next semver from `feat:` / `fix:` / `!` prefixes
#   3. Maintains a single draft 'chore(main): release X.Y.Z' PR with the
#      bumped package.json + auto-generated CHANGELOG entry
#   4. When that PR is merged, it tags vX.Y.Z and creates the GitHub Release
#
# The separate release.yml workflow listens for `v*` tag pushes and
# publishes to npm via OIDC trusted publishing. So the full chain is:
#
#   merge feat/fix PR -> release-please opens release PR -> merge release PR
#   -> tag created -> release.yml fires -> npm publish + GH Release attached
#
# Operator never types `npm version` or `git tag` again.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write       # release-please tags + publishes the GitHub Release
  pull-requests: write  # release-please opens / updates the release PR

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          # GITHUB_TOKEN tags do not fire downstream workflows (release.yml).
          # Use a user PAT so tag pushes trigger npm publish. See NPM_SETUP.md.
          token: ${{ secrets.RELEASE_PAT }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
