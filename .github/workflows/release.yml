name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write       # for GitHub release
  id-token: write       # for npm provenance

jobs:
  npm-publish:
    name: npm publish
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/openacp-openai-tts-plugin
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          registry-url: https://registry.npmjs.org/
      - name: Upgrade npm CLI to latest (Trusted Publishing needs >= 11.5.1)
        run: npm install -g npm@latest
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Test
        run: npm test
      - name: Verify tag matches package.json
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [[ "$PKG_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::tag $TAG_VERSION does not match package.json $PKG_VERSION"
            exit 1
          fi
      - name: Publish to npm with provenance
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [[ -n "$NPM_TOKEN" ]]; then
            echo "auth: NPM_TOKEN bootstrap"
            echo "token length: ${#NPM_TOKEN} (should be ~36+ for granular, ~36 for classic)"
            echo "token prefix: ${NPM_TOKEN:0:5}... (npm_=granular/classic, ghp_/gho_/ghs_=GitHub token in wrong field!)"
            echo "//registry.npmjs.org/:_authToken=$NPM_TOKEN" > ~/.npmrc
            echo "registry=https://registry.npmjs.org/" >> ~/.npmrc
          else
            echo "auth: Trusted Publishing (OIDC)"
          fi
          echo "=== npm whoami (verifies token resolves to a user) ==="
          npm whoami || { echo "::error::npm whoami failed - token is invalid OR can't auth at all"; exit 1; }
          echo "=== npm access list packages (what this token can write) ==="
          npm access list packages 2>&1 | head -20 || true
          echo "=== publish ==="
          npm publish --provenance --access public

  github-release:
    name: GitHub release
    runs-on: ubuntu-latest
    needs: npm-publish
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Extract changelog entry
        id: changelog
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            BEGIN { found=0 }
            /^## / {
              if (found) exit
              if (index($0, ver)) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          if [[ ! -s /tmp/release-notes.md ]]; then
            echo "No changelog entry for $version - using default notes."
            echo "Release $version" > /tmp/release-notes.md
          fi
      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          body_path: /tmp/release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
