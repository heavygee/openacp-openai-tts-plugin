name: Bug report
description: Something broken or behaving unexpectedly.
title: "[bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please include enough info that
        a maintainer can reproduce without a back-and-forth.

        **Security issue?** Don't file it here - see [SECURITY.md](https://github.com/heavygee/openacp-openai-tts-plugin/blob/main/SECURITY.md).
  - type: input
    id: version
    attributes:
      label: Plugin version
      description: Output of `npm view openacp-openai-tts-plugin version` or commit SHA if running from source.
      placeholder: "1.0.0"
    validations:
      required: true
  - type: input
    id: openacp
    attributes:
      label: OpenACP CLI version
      description: Output of `openacp --version`.
      placeholder: "2026.518.2"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node version
      description: Output of `node --version`.
      placeholder: "v20.18.0"
    validations:
      required: true
  - type: dropdown
    id: server
    attributes:
      label: TTS server
      description: Which OpenAI-compatible TTS server are you targeting?
      options:
        - Kokoro
        - Chatterbox (standard mode)
        - Chatterbox (voice-cloning / upload mode)
        - AllTalk
        - F5-TTS
        - StyleTTS2
        - Other (please describe in the bug body)
    validations:
      required: true
  - type: input
    id: server-version
    attributes:
      label: Server version + endpoint
      description: Server version + the endpoint URL (redact hostnames if you'd rather).
      placeholder: "Kokoro 0.19.0 @ http://localhost:8880"
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: Describe the bug. Include exact commands you ran and the output you saw.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: |
        Step-by-step. Include the plugin config (redact `apiKey`).
      placeholder: |
        1. `openacp plugin install openacp-openai-tts-plugin`
        2. Configure: endpoint=http://localhost:8880, model=kokoro, voice=af_bella
        3. Run a session that hits TTS
        4. Observe the crash / wrong output
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs / terminal output
      description: Paste any `[openai-tts] ...` log lines here. Strip API keys / Bearer tokens.
      render: shell
  - type: checkboxes
    id: terms
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and didn't find a duplicate.
          required: true
        - label: I redacted any API keys / Bearer tokens / private hostnames from the logs above.
          required: true
        - label: This is not a security issue (those go via SECURITY.md).
          required: true
