blank_issues_enabled: false
contact_links:
  - name: Security vulnerability
    url: https://github.com/heavygee/openacp-openai-tts-plugin/security/advisories/new
    about: Report security issues privately - do NOT use public issues.
  - name: Question / support
    url: https://github.com/heavygee/openacp-openai-tts-plugin/issues/new?labels=question&template=bug_report.yml
    about: Quick how-do-I question - use the bug template and add the `question` label.
  - name: OpenACP CLI issues
    url: https://github.com/Open-ACP/OpenACP/issues
    about: Issues with the OpenACP CLI itself or the plugin SDK belong in Open-ACP/OpenACP.
  - name: TTS server bugs
    url: https://github.com/heavygee/openacp-openai-tts-plugin/discussions
    about: Server-side TTS bugs (Kokoro, Chatterbox, etc.) belong with the upstream project, but feel free to discuss workarounds here.
